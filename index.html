<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta charset="utf-8" />
  <title>LPA Management APP</title>
  <style>
    * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; margin: 0; background: #f5f5f5; }

    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; background:#fff; padding:12px 16px; border-bottom:1px solid #eee; }
    .app-title { font-size:17px; font-weight:900; }
    .app-sub { font-size:12px; color:#666; margin-top:2px; }

    .main-tabs { display:flex; gap:6px; padding:10px 12px; background:#fff; border-bottom:1px solid #eee; }
    .main-tab { flex:1; padding:9px 6px; border-radius:10px; border:1px solid #ddd; background:#f9f9f9; font-size:13px; font-weight:600; color:#555; cursor:pointer; text-align:center; }
    .main-tab.active { background:#111; color:#fff; border-color:#111; }

    .page { display:none; padding:12px; }
    .page.active { display:block; }

    .sub-tabs { display:flex; gap:6px; margin-bottom:12px; }
    .sub-tab { flex:1; padding:9px 6px; border-radius:10px; border:1px solid #ddd; background:#f9f9f9; font-size:13px; font-weight:600; color:#555; cursor:pointer; text-align:center; }
    .sub-tab.active { background:#111; color:#fff; border-color:#111; }

    .card { background:#fff; border-radius:14px; padding:14px; margin-bottom:12px; }
    .card-title { font-size:15px; font-weight:800; margin-bottom:10px; }

    .row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
    .row:last-child { border-bottom:none; }
    .row-left { flex:1; min-width:0; }
    .row-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-sub { font-size:11px; color:#888; margin-top:2px; }

    .person-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f0f0f0; cursor:pointer; }
    .person-row:last-child { border-bottom:none; }
    .person-row:hover { background:#fafafa; margin:0 -4px; padding:12px 4px; border-radius:8px; }
    .chips { display:flex; gap:5px; flex-wrap:wrap; margin-top:4px; }
    .chip { font-size:11px; color:#555; background:#f0f0f0; padding:2px 7px; border-radius:20px; }

    .badge { padding:5px 10px; border-radius:999px; font-weight:800; font-size:13px; white-space:nowrap; }
    .badge.cash { background:#f0f0f0; color:#111; }
    .badge.bank { background:#e7f0ff; color:#0b3a9a; }
    .badge.advance { background:#fff0e5; color:#8a3a00; }
    .badge.deposit { background:#e5f5e5; color:#1a6a1a; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .total-box { background:#f8f8f8; border-radius:12px; padding:12px; }
    .total-label { font-size:11px; color:#888; margin-bottom:4px; }
    .total-val { font-size:20px; font-weight:900; letter-spacing:-0.5px; }

    input, select, textarea { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; font-size:14px; background:#fafafa; }
    textarea { min-height:70px; resize:vertical; }
    label { font-size:12px; color:#666; margin-bottom:4px; display:block; margin-top:10px; }
    .btn { width:100%; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; margin-top:14px; }
    .btn-black { background:#111; color:#fff; }
    .btn-black:hover { background:#333; }
    .btn-red { background:#c00; color:#fff; }
    .btn-green { background:#1a6a1a; color:#fff; }
    .form-msg { font-size:13px; color:#555; text-align:center; margin-top:8px; }

    .filters { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .filters-actions { grid-column:1/-1; display:flex; gap:8px; }
    .filters-actions button { flex:1; padding:9px; border-radius:10px; border:1px solid #ddd; font-size:13px; font-weight:600; cursor:pointer; }
    input[type="date"] { background:#eee; }

    /* Person Modal */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .modal-bg.hidden { display:none !important; }
    .modal-sheet { background:#fff; border-radius:22px 22px 0 0; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; padding:20px; padding-bottom:44px; }
    .modal-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .modal-close { background:#f0f0f0; border:none; border-radius:20px; width:34px; height:34px; font-size:15px; cursor:pointer; }
    .modal-stats { display:flex; gap:8px; margin-bottom:16px; }
    .mstat { flex:1; background:#f8f8f8; border-radius:12px; padding:10px; text-align:center; }
    .mstat-l { font-size:10px; color:#888; margin-bottom:3px; }
    .mstat-v { font-size:13px; font-weight:700; }
    .modal-tabs { display:flex; gap:6px; margin-bottom:14px; }
    .modal-tab { flex:1; padding:9px; border-radius:10px; border:none; background:#f0f0f0; color:#666; font-weight:600; font-size:13px; cursor:pointer; }
    .modal-tab.active { background:#111; color:#fff; }
    .modal-tab.red.active { background:#c00; }

    /* Sig img modal */
    .sigimg-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
    .sigimg-bg.hidden { display:none !important; }
    .sigimg-box { background:#fff; border-radius:16px; padding:18px; max-width:500px; width:100%; }

    /* Deposit card */
    .dep-card { background:#fff; border-radius:14px; padding:14px; margin-bottom:10px; border-left:4px solid #1a6a1a; }
    .dep-name { font-size:15px; font-weight:800; }
    .dep-date { font-size:12px; color:#666; }
    .dep-row { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
    .dep-img { max-width:100%; border-radius:8px; margin-top:8px; cursor:pointer; max-height:100px; object-fit:contain; }

    /* Permission toggles */
    .user-card { background:#fff; border-radius:12px; padding:12px; margin-bottom:8px; }
    .user-name { font-size:14px; font-weight:700; }
    .user-token { font-size:11px; color:#aaa; font-family:monospace; }
    .perm-row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .perm-btn { padding:5px 12px; border-radius:20px; border:1px solid #ddd; font-size:12px; font-weight:600; cursor:pointer; background:#f5f5f5; color:#666; }
    .perm-btn.on { background:#111; color:#fff; border-color:#111; }

    .muted { color:#666; font-size:12px; }
    .hidden { display:none !important; }
    h1,h2,h3 { margin:0; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="app-title">LPA Management</div>
    <div class="app-sub" id="meLine">Enter token in Settings</div>
  </div>
  <button onclick="doRefresh()" style="background:#111;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-weight:600;cursor:pointer;">Refresh</button>
</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <button class="main-tab active" id="tabWages" onclick="showPage('wages')">💰 Wages</button>
  <button class="main-tab" id="tabDeposits" onclick="showPage('deposits')">📋 Deposits</button>
  <button class="main-tab" id="tabSettings" onclick="showPage('settings')">⚙️ Settings</button>
</div>

<!-- ══ WAGES PAGE ══════════════════════════════════════════ -->
<div class="page active" id="pageWages">
  <div class="sub-tabs">
    <button class="sub-tab active" id="wSubStatus" onclick="showWagesSub('status')">Status</button>
    <button class="sub-tab" id="wSubHistory" onclick="showWagesSub('history')">History</button>
    <button class="sub-tab" id="wSubSig" onclick="showWagesSub('signatures')">Signatures</button>
  </div>

  <!-- Status -->
  <div id="wagesStatus">
    <div class="card" id="totalsCard">
      <div class="card-title">Totals</div>
      <div class="grid2">
        <div class="total-box"><div class="total-label">Total WAGE</div><div class="total-val" id="tWage">—</div></div>
        <div class="total-box"><div class="total-label">Total Due</div><div class="total-val" id="tDue">—</div></div>
        <div class="total-box"><div class="total-label">Cash Paid</div><div class="total-val" id="tCash">—</div></div>
        <div class="total-box"><div class="total-label">Bank Paid</div><div class="total-val" id="tBank">—</div></div>
      </div>
      <div class="muted" id="lastUpdated" style="margin-top:10px;">—</div>
    </div>
    <div class="card">
      <div class="card-title">Staff Status</div>
      <div class="muted" style="margin-bottom:10px;font-style:italic;">Tap to add payment, advance or collect debt</div>
      <div id="peopleList"></div>
    </div>
  </div>

  <!-- History -->
  <div id="wagesHistory" class="hidden">
    <div class="sub-tabs">
      <button class="sub-tab active" id="hSubWage" onclick="showHistSub('wage')">Wage History</button>
      <button class="sub-tab" id="hSubAdv" onclick="showHistSub('advance')">Advance History</button>
    </div>
    <div id="histWage">
      <div class="card">
        <div class="filters">
          <div><label>Person</label><select id="whPerson"><option value="">All</option></select></div>
          <div><label>From</label><input id="whFrom" type="date" /></div>
          <div><label>To</label><input id="whTo" type="date" /></div>
          <div class="filters-actions">
            <button class="btn-black" style="color:#fff;background:#111;border-color:#111;" onclick="loadWageHistory()">Apply</button>
            <button onclick="clearWageFilters()">Clear</button>
          </div>
        </div>
        <div class="muted" id="whMsg"></div>
        <div id="wageHistoryList"></div>
      </div>
    </div>
    <div id="histAdv" class="hidden">
      <div class="card">
        <div class="filters">
          <div><label>Person</label><select id="ahPerson"><option value="">All</option></select></div>
          <div><label>From</label><input id="ahFrom" type="date" /></div>
          <div><label>To</label><input id="ahTo" type="date" /></div>
          <div class="filters-actions">
            <button class="btn-black" style="color:#fff;background:#111;border-color:#111;" onclick="loadAdvHistory()">Apply</button>
            <button onclick="clearAdvFilters()">Clear</button>
          </div>
        </div>
        <div class="muted" id="ahMsg"></div>
        <div id="advanceHistoryList"></div>
      </div>
    </div>
  </div>

  <!-- Signatures -->
  <div id="wagesSignatures" class="hidden">
    <div class="card">
      <div class="filters">
        <div><label>Person</label><select id="sigPerson"><option value="">All</option></select></div>
        <div><label>Type</label>
          <select id="sigType"><option value="">All</option><option value="payment">Payment</option><option value="advance">Advance</option></select>
        </div>
        <div class="filters-actions">
          <button class="btn-black" style="color:#fff;background:#111;" onclick="loadSignatures()">Load</button>
        </div>
      </div>
      <div class="muted" id="sigMsg"></div>
      <div id="sigList"></div>
    </div>
  </div>
</div>

<!-- ══ DEPOSITS PAGE ═══════════════════════════════════════ -->
<div class="page hidden" id="pageDeposits">
  <div class="sub-tabs">
    <button class="sub-tab active" id="dSubAdd" onclick="showDepSub('add')">+ Add</button>
    <button class="sub-tab" id="dSubList" onclick="showDepSub('list')">List</button>
  </div>

  <!-- Add Deposit -->
  <div id="depAdd">
    <div class="card">
      <div class="card-title">New Deposit</div>
      <label>Customer Name</label>
      <input id="depName" placeholder="John Smith" />
      <div class="grid2">
        <div><label>Reservation Date</label><input id="depDate" type="date" /></div>
        <div><label>Covers (people)</label><input id="depCovers" type="number" placeholder="4" /></div>
      </div>
      <div class="grid2">
        <div><label>Amount</label><input id="depAmount" inputmode="decimal" placeholder="100" /></div>
        <div><label>Method</label>
          <select id="depMethod"><option value="CASH">Cash</option><option value="CC">Credit Card</option><option value="BANK">Bank</option></select>
        </div>
      </div>
      <label>Note</label>
      <input id="depNote" placeholder="Any notes..." />
      <label>Receipt / Slip Photo (optional)</label>
      <div style="margin-top:4px;">
        <input type="file" id="depImage" accept="image/*" style="background:#fff;" />
      </div>
      <div id="depImgPreview" style="margin-top:8px;"></div>
      <button class="btn btn-green" onclick="addDeposit()">Save Deposit</button>
      <div class="form-msg" id="depMsg"></div>
    </div>
  </div>

  <!-- Deposit List -->
  <div id="depList" class="hidden">
    <div class="card">
      <div class="filters">
        <div><label>From</label><input id="depFrom" type="date" /></div>
        <div><label>To</label><input id="depTo" type="date" /></div>
        <div class="filters-actions">
          <button class="btn-black" style="color:#fff;background:#111;" onclick="loadDeposits()">Apply</button>
          <button onclick="clearDepFilters()">Clear</button>
        </div>
      </div>
      <div class="muted" id="depListMsg"></div>
      <div id="depositsList"></div>
    </div>
  </div>
</div>

<!-- ══ SETTINGS PAGE ══════════════════════════════════════ -->
<div class="page hidden" id="pageSettings">
  <div class="card">
    <div class="card-title">Token</div>
    <input id="tokenInput" placeholder="Your token..." />
    <div class="muted" style="margin-top:5px;">Share via link: <b>?token=...</b></div>
    <button class="btn btn-black" onclick="saveToken()">Save Token</button>
    <div class="form-msg" id="tokenMsg"></div>
  </div>

  <div class="hidden" id="adminSection">
    <div class="card">
      <div class="card-title">Add User</div>
      <div class="grid2">
        <div><label>Name</label><input id="newUserName" placeholder="Ali" /></div>
        <div><label>Role</label>
          <select id="newUserRole"><option value="VIEWER">VIEWER</option><option value="EDITOR">EDITOR</option><option value="ADMIN">ADMIN</option></select>
        </div>
      </div>
      <button class="btn btn-black" onclick="addUser()">Create User</button>
      <div class="form-msg" id="adminMsg"></div>
    </div>

    <div class="card">
      <div class="card-title">User Permissions</div>
      <div class="muted" style="margin-bottom:10px;">Tap a permission to toggle on/off</div>
      <div id="userPermList"></div>
      <button class="btn btn-black" style="margin-top:10px;" onclick="loadUsers()">↻ Refresh Users</button>
    </div>
  </div>
</div>

<!-- Person Modal -->
<div class="modal-bg hidden" id="personModal">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <div>
        <div style="font-size:22px;font-weight:900;" id="mName">—</div>
        <div class="muted" id="mDue">Due: —</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-stats">
      <div class="mstat"><div class="mstat-l">WAGE</div><div class="mstat-v" id="mWage">—</div></div>
      <div class="mstat"><div class="mstat-l">Cash Paid</div><div class="mstat-v" id="mCash">—</div></div>
      <div class="mstat"><div class="mstat-l">Bank Paid</div><div class="mstat-v" id="mBank">—</div></div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="mtPay" onclick="switchMTab('payment')">💵 Payment</button>
      <button class="modal-tab" id="mtAdv" onclick="switchMTab('advance')">💳 Advance</button>
      <button class="modal-tab red" id="mtDebt" onclick="switchMTab('debt')">🔴 Collect</button>
    </div>
    <div class="grid2">
      <div><label>Amount</label><input id="mAmount" inputmode="decimal" placeholder="0.00" /></div>
      <div><label>Method</label><select id="mMethod"><option value="CASH">Cash</option><option value="BANK">Bank</option></select></div>
    </div>
    <label id="mByLabel">Paid By</label>
    <input id="mBy" />
    <label>Note</label>
    <input id="mNote" placeholder="Optional" />
    <button class="btn btn-black" id="mAddBtn" onclick="modalSubmit()">Add Payment</button>
    <div class="form-msg" id="mMsg"></div>
  </div>
</div>

<!-- Sig Image Modal -->
<div class="sigimg-bg hidden" id="sigImgModal">
  <div class="sigimg-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div>
        <div style="font-weight:700;" id="sigImgTitle"></div>
        <div class="muted" id="sigImgMeta"></div>
      </div>
      <button onclick="closeSigImg()" style="background:#eee;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700;">✕</button>
    </div>
    <img id="sigImgEl" style="max-width:100%;border-radius:8px;" />
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC-zzdN5aBvZ0SNABA2nUvThNOvcC5MGbA",
  authDomain: "lpamanagement.firebaseapp.com",
  projectId: "lpamanagement",
  storageBucket: "lpamanagement.firebasestorage.app",
  messagingSenderId: "401279993684",
  appId: "1:401279993684:web:124f9827bff9a41cf22ac1",
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const API = "https://script.google.com/macros/s/AKfycbyE7Vqczhafvx74GRIkz_8bc2D9ip4SW_QFW-sEK95fo3s7JkOxdR-HDk1F1X4urw8B/exec";
const qs = new URLSearchParams(location.search);

// ── Helpers ──────────────────────────────────────────────
const fmt = n => Number(n||0).toLocaleString('en-GB',{style:'currency',currency:'GBP'});
const $ = id => document.getElementById(id);
function jsonp(action, params={}){
  return new Promise((res,rej)=>{
    const cb='__cb_'+Math.random().toString(36).slice(2);
    const u=new URL(API); u.searchParams.set('action',action); u.searchParams.set('callback',cb);
    Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
    const s=document.createElement('script');
    window[cb]=d=>{delete window[cb];s.remove();res(d);};
    s.onerror=()=>{delete window[cb];s.remove();rej(new Error('JSONP failed'));};
    s.src=u.toString(); document.body.appendChild(s);
  });
}
function shortM(t){const s=String(t||'').toUpperCase();if(s.includes('BANK'))return'Bank';if(s.includes('CASH'))return'Cash';return'';}
function inRange(d,f,t){if(!d)return false;if(f&&d<f)return false;if(t&&d>t)return false;return true;}
function prevStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()-1,1).toISOString().slice(0,10);}
function prevEnd(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),0).toISOString().slice(0,10);}
function getToken(){return $('tokenInput').value.trim();}

// ── State ─────────────────────────────────────────────────
let currentPage='wages', currentMe=null, peopleDueMap={}, modalPerson=null, modalTab='payment';

// ── Page navigation ───────────────────────────────────────
window.showPage = function(page){
  currentPage=page;
  ['wages','deposits','settings'].forEach(p=>{
    $(`page${p.charAt(0).toUpperCase()+p.slice(1)}`).classList.toggle('active',p===page);
    $(`page${p.charAt(0).toUpperCase()+p.slice(1)}`).classList.toggle('hidden',p!==page);
    $(`tab${p.charAt(0).toUpperCase()+p.slice(1)}`).classList.toggle('active',p===page);
  });
  if(page==='wages'){refreshSummary();}
  if(page==='deposits'&&currentMe&&hasPerm('deposits')){showDepSub('add');}
  if(page==='settings'){refreshSummary();}
};

window.showWagesSub = function(sub){
  ['status','history','signatures'].forEach(s=>{
    $(`wSub${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.toggle('active',s===sub);
    const el=$(`wages${s.charAt(0).toUpperCase()+s.slice(1)}`);
    el.classList.toggle('hidden',s!==sub);
  });
  if(sub==='history'){$('whFrom').value=prevStart();$('whTo').value=prevEnd();loadWageHistory();}
  if(sub==='signatures')loadSignatures();
};

window.showHistSub = function(sub){
  $('hSubWage').classList.toggle('active',sub==='wage');
  $('hSubAdv').classList.toggle('active',sub==='advance');
  $('histWage').classList.toggle('hidden',sub!=='wage');
  $('histAdv').classList.toggle('hidden',sub!=='advance');
  if(sub==='wage')loadWageHistory();
  if(sub==='advance'){$('ahFrom').value=prevStart();$('ahTo').value=prevEnd();loadAdvHistory();}
};

window.showDepSub = function(sub){
  $('dSubAdd').classList.toggle('active',sub==='add');
  $('dSubList').classList.toggle('active',sub==='list');
  $('depAdd').classList.toggle('hidden',sub!=='add');
  $('depList').classList.toggle('hidden',sub!=='list');
  if(sub==='list')loadDeposits();
};

function hasPerm(perm){
  if(!currentMe)return false;
  if(currentMe.role==='ADMIN')return true;
  return (currentMe.permissions||'').split(',').map(s=>s.trim()).includes(perm);
}

// ── Summary ───────────────────────────────────────────────
async function refreshSummary(){
  const token=getToken(); if(!token)return;
  const data=await jsonp('summary',{token});
  if(!data.ok){$('tokenMsg').textContent='Error: '+(data.error||'');return;}
  currentMe=data.me;
  $('meLine').textContent=`${data.me.name} • ${data.me.role}`;
  $('lastUpdated').textContent='Last updated: '+new Date().toLocaleString('en-GB');

  // Show/hide sections based on permissions
  const hasWages=hasPerm('wages'), hasDeps=hasPerm('deposits');
  $('tabWages').style.display=hasWages?'':'none';
  $('tabDeposits').style.display=hasDeps?'':'none';
  $('adminSection').classList.toggle('hidden',data.me.role!=='ADMIN');

  if(data.totals){
    $('tWage').textContent=fmt(data.totals.total_wage);
    $('tDue').textContent=fmt(data.totals.total_cash_due);
    $('tCash').textContent=fmt(data.totals.total_cash_paid);
    $('tBank').textContent=fmt(data.totals.total_bank_paid);
  }

  peopleDueMap={};
  const sorted=[...(data.people||[])].sort((a,b)=>{
    const az=Math.abs(Number(a.cash_due||0))<0.005,bz=Math.abs(Number(b.cash_due||0))<0.005;
    if(az!==bz)return az?1:-1; return Number(b.cash_due)-Number(a.cash_due);
  });
  sorted.forEach(p=>{peopleDueMap[p.person]=p;});

  const list=$('peopleList'); list.innerHTML='';
  sorted.filter(p=>Math.abs(Number(p.cash_due||0))>=0.005).forEach(p=>{
    const div=document.createElement('div'); div.className='person-row';
    div.innerHTML=`<div style="flex:1;min-width:0;">
      <div class="row-name">${p.person}</div>
      <div class="chips">
        <span class="chip">W: ${fmt(p.wage_total)}</span>
        <span class="chip">💵 ${fmt(p.cash_paid_total)}</span>
        <span class="chip">🏦 ${fmt(p.bank_paid_total)}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:16px;font-weight:800;${p.cash_due<0?'color:#c00':''}">${fmt(p.cash_due)}</span>
      <span style="color:#ccc;font-size:18px;">›</span>
    </div>`;
    div.onclick=()=>openModal(p);
    list.appendChild(div);
  });

  // Update person selects
  ['whPerson','ahPerson','sigPerson'].forEach(id=>{
    const sel=$(id); const prev=sel.value;
    sel.innerHTML='<option value="">All</option>';
    sorted.forEach(p=>{const o=document.createElement('option');o.value=p.person;o.textContent=p.person;sel.appendChild(o);});
    if([...sel.options].some(o=>o.value===prev))sel.value=prev;
  });

  // Set modal by field
  if(currentMe) $('mBy').value=$('mBy').value||currentMe.name;
}

window.doRefresh = async function(){
  await refreshSummary();
  if(currentPage==='deposits')loadDeposits();
};

// ── Modal ────────────────────────────────────────────────
function openModal(p){
  if(!hasPerm('wages'))return;
  modalPerson=p;
  $('mName').textContent=p.person;
  $('mDue').textContent='Due: '+fmt(p.cash_due);
  $('mWage').textContent=fmt(p.wage_total);
  $('mCash').textContent=fmt(p.cash_paid_total);
  $('mBank').textContent=fmt(p.bank_paid_total);
  $('mAmount').value=''; $('mNote').value=''; $('mMsg').textContent='';
  if(currentMe)$('mBy').value=currentMe.name;
  switchMTab('payment');
  $('personModal').classList.remove('hidden');
}

window.closeModal=()=>$('personModal').classList.add('hidden');
$('personModal').onclick=e=>{if(e.target===$('personModal'))closeModal();};

window.switchMTab=function(tab){
  modalTab=tab;
  ['Pay','Adv','Debt'].forEach(t=>{
    const id='mt'+t;
    $(`mt${t}`).classList.toggle('active',
      (t==='Pay'&&tab==='payment')||(t==='Adv'&&tab==='advance')||(t==='Debt'&&tab==='debt')
    );
  });
  if(tab==='payment'){$('mByLabel').textContent='Paid By';$('mAddBtn').textContent='Add Payment';$('mAddBtn').style.background='#111';}
  else if(tab==='advance'){$('mByLabel').textContent='Given By';$('mAddBtn').textContent='Add Advance';$('mAddBtn').style.background='#111';}
  else{$('mByLabel').textContent='Received By';$('mAddBtn').textContent='💰 Collect Debt';$('mAddBtn').style.background='#c00';}
};

window.modalSubmit=async function(){
  const token=getToken(); if(!token||!modalPerson)return;
  const amount=$('mAmount').value, method=$('mMethod').value;
  const by=$('mBy').value.trim(), note=$('mNote').value.trim();
  const msg=$('mMsg');
  if(!amount||isNaN(parseFloat(amount))||parseFloat(amount)<=0){msg.textContent='Enter a valid amount';return;}
  msg.textContent='Saving...'; $('mAddBtn').disabled=true;
  try{
    let res;
    if(modalTab==='payment') res=await jsonp('add_payment',{token,person:modalPerson.person,amount,method,paid_by:by,note});
    else if(modalTab==='advance') res=await jsonp('add_advance',{token,person:modalPerson.person,amount,method,paid_by:by,note});
    else res=await jsonp('add_wage',{token,person:modalPerson.person,amount,note:note||'Debt collected'});
    if(!res.ok){msg.textContent='Error: '+(res.error||'');return;}
    msg.textContent='✅ Saved!';
    $('mAmount').value=''; $('mNote').value='';
    await refreshSummary();
    const updated=peopleDueMap[modalPerson.person];
    if(updated){
      modalPerson=updated;
      $('mDue').textContent='Due: '+fmt(updated.cash_due);
      $('mWage').textContent=fmt(updated.wage_total);
      $('mCash').textContent=fmt(updated.cash_paid_total);
      $('mBank').textContent=fmt(updated.bank_paid_total);
    }
  }catch(e){msg.textContent='Error: '+e.message;}
  finally{$('mAddBtn').disabled=false;}
};

// ── Wage History ──────────────────────────────────────────
window.loadWageHistory=async function(){
  const token=getToken();if(!token)return;
  const msg=$('whMsg'); msg.textContent='Loading...';
  const params={token};
  const p=$('whPerson').value,f=$('whFrom').value,t=$('whTo').value;
  if(p)params.person=p; if(f)params.from=f; if(t)params.to=t;
  const data=await jsonp('wage_history',params);
  if(!data.ok){msg.textContent='Error: '+(data.error||'');return;}
  msg.textContent='';
  const box=$('wageHistoryList'); box.innerHTML='';
  (data.wage_history||[]).forEach(w=>{
    const div=document.createElement('div');div.className='row';
    const bc=String(w.type||'').includes('BANK')?'bank':'cash';
    div.innerHTML=`<div class="row-left"><div class="row-name">${w.person||''}</div><div class="row-sub">${w.paid_by||''} • ${w.date||''}${shortM(w.type)?' • '+shortM(w.type):''}</div>${w.note?`<div class="row-sub">${w.note}</div>`:''}</div><span class="badge ${bc}">${fmt(w.amount)}</span>`;
    box.appendChild(div);
  });
  if(!(data.wage_history||[]).length)msg.textContent='No results.';
};

window.clearWageFilters=function(){$('whPerson').value='';$('whFrom').value='';$('whTo').value='';loadWageHistory();};

// ── Advance History ───────────────────────────────────────
window.loadAdvHistory=async function(){
  const token=getToken();if(!token)return;
  const msg=$('ahMsg'); msg.textContent='Loading...';
  const data=await jsonp('advance_history',{token});
  if(!data.ok){msg.textContent='Error: '+(data.error||'');return;}
  let rows=data.advance_history||[];
  const p=$('ahPerson').value,f=$('ahFrom').value,t=$('ahTo').value;
  if(p)rows=rows.filter(r=>r.person===p);
  if(f||t)rows=rows.filter(r=>inRange(r.date,f,t));
  msg.textContent='';
  const box=$('advanceHistoryList'); box.innerHTML='';
  rows.forEach(a=>{
    const div=document.createElement('div');div.className='row';
    div.innerHTML=`<div class="row-left"><div class="row-name">${a.person||''}</div><div class="row-sub">${a.paid_by||''} • ${a.date||''}${shortM(a.method)?' • '+shortM(a.method):''}</div>${a.note?`<div class="row-sub">${a.note}</div>`:''}</div><span class="badge advance">${fmt(a.amount)}</span>`;
    box.appendChild(div);
  });
  if(!rows.length)msg.textContent='No results.';
};

window.clearAdvFilters=function(){$('ahPerson').value='';$('ahFrom').value='';$('ahTo').value='';loadAdvHistory();};

// ── Signatures ────────────────────────────────────────────
window.loadSignatures=async function(){
  const msg=$('sigMsg'),box=$('sigList');
  msg.textContent='Loading...'; box.innerHTML='';
  try{
    const pf=$('sigPerson').value, tf=$('sigType').value;
    const snap=await getDocs(query(collection(db,'signatures'),orderBy('createdAt','desc')));
    let docs=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(pf)docs=docs.filter(d=>d.person===pf);
    if(tf)docs=docs.filter(d=>d.type===tf);
    msg.textContent=docs.length?'':'No signatures found.';
    docs.forEach(sig=>{
      const div=document.createElement('div'); div.className='row';
      const title=`${sig.type==='payment'?'Payment':'Advance'}: ${fmt(sig.amount)} – ${sig.person}`;
      const meta=`${sig.paidBy||''} · ${sig.date||''} · ${sig.method||''}`;
      div.innerHTML=`<div class="row-left">
        <div class="row-name">${sig.person}</div>
        <div class="row-sub">${meta}${sig.note?' · '+sig.note:''}</div>
        <img src="${sig.signatureBase64}" style="max-width:100%;max-height:80px;border-radius:6px;margin-top:6px;cursor:pointer;border:1px solid #eee;"
          onclick="openSigImg('${sig.signatureBase64}','${title}','${meta}')" />
      </div>
      <span class="badge ${sig.type==='payment'?'cash':'advance'}" style="align-self:flex-start;">${fmt(sig.amount)}</span>`;
      box.appendChild(div);
    });
  }catch(e){msg.textContent='Error: '+e.message;}
};

window.openSigImg=function(src,title,meta){
  $('sigImgTitle').textContent=title;$('sigImgMeta').textContent=meta;$('sigImgEl').src=src;
  $('sigImgModal').classList.remove('hidden');
};
window.closeSigImg=()=>$('sigImgModal').classList.add('hidden');

// ── Deposits ──────────────────────────────────────────────
$('depImage').onchange=function(){
  const file=this.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    $('depImgPreview').innerHTML=`<img src="${e.target.result}" style="max-width:100%;max-height:150px;border-radius:8px;margin-top:4px;" />`;
  };
  reader.readAsDataURL(file);
};

window.addDeposit=async function(){
  const token=getToken(); if(!token)return;
  const name=$('depName').value.trim();
  const resDate=$('depDate').value;
  const covers=$('depCovers').value||'0';
  const amount=$('depAmount').value;
  const method=$('depMethod').value;
  const note=$('depNote').value.trim();
  const msg=$('depMsg');
  if(!name){msg.textContent='Customer name required';return;}
  if(!resDate){msg.textContent='Reservation date required';return;}
  if(!amount||isNaN(parseFloat(amount))){msg.textContent='Enter a valid amount';return;}

  let imageBase64='';
  const fileInput=$('depImage');
  if(fileInput.files[0]){
    imageBase64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result);
      reader.readAsDataURL(fileInput.files[0]);
    });
  }

  msg.textContent='Saving...';
  const res=await jsonp('add_deposit',{token,customer_name:name,res_date:resDate,covers,amount,method,note,image_base64:imageBase64});
  if(!res.ok){msg.textContent='Error: '+(res.error||'');return;}
  msg.textContent='✅ Deposit saved!';
  $('depName').value='';$('depDate').value='';$('depCovers').value='';$('depAmount').value='';$('depNote').value='';$('depImgPreview').innerHTML='';fileInput.value='';
};

window.loadDeposits=async function(){
  const token=getToken();if(!token)return;
  const msg=$('depListMsg'),box=$('depositsList');
  msg.textContent='Loading...'; box.innerHTML='';
  const params={token};
  const f=$('depFrom').value,t=$('depTo').value;
  if(f)params.from=f; if(t)params.to=t;
  const data=await jsonp('get_deposits',params);
  if(!data.ok){msg.textContent='Error: '+(data.error||'');return;}
  const deps=data.deposits||[];
  msg.textContent=deps.length?'':'No deposits found.';
  deps.forEach(d=>{
    const div=document.createElement('div'); div.className='dep-card';
    const methodBadge=d.method==='CC'?'💳 Credit Card':d.method==='BANK'?'🏦 Bank':'💵 Cash';
    div.innerHTML=`
      <div class="dep-row">
        <div><div class="dep-name">${d.customer_name}</div><div class="dep-date">📅 ${d.res_date} · 👥 ${d.covers} covers</div></div>
        <div style="text-align:right;"><div style="font-size:18px;font-weight:900;">${fmt(d.amount)}</div><div class="muted">${methodBadge}</div></div>
      </div>
      ${d.note?`<div class="muted" style="margin-top:6px;">📝 ${d.note}</div>`:''}
      ${d.added_by?`<div class="muted">Added by: ${d.added_by}</div>`:''}
      ${d.image_base64?`<img src="${d.image_base64}" class="dep-img" onclick="openDepImg('${d.image_base64}')" title="Click to enlarge" />`:''}
    `;
    box.appendChild(div);
  });
};

window.openDepImg=function(src){$('sigImgEl').src=src;$('sigImgTitle').textContent='Receipt';$('sigImgMeta').textContent='';$('sigImgModal').classList.remove('hidden');};
window.clearDepFilters=function(){$('depFrom').value='';$('depTo').value='';loadDeposits();};

// ── Settings ──────────────────────────────────────────────
window.saveToken=async function(){
  const t=$('tokenInput').value.trim();
  if(!t){$('tokenMsg').textContent='Token cannot be empty';return;}
  localStorage.setItem('lpa_token',t);
  $('tokenMsg').textContent='Saved. Refreshing...';
  await refreshSummary();
  if(hasPerm('wages'))showPage('wages');
  else if(hasPerm('deposits'))showPage('deposits');
};

window.addUser=async function(){
  const token=getToken();
  const name=$('newUserName').value.trim(), role=$('newUserRole').value;
  const msg=$('adminMsg'); msg.textContent='Creating...';
  const res=await jsonp('add_user',{token,name,role});
  if(!res.ok){msg.textContent='Error: '+(res.error||'');return;}
  msg.textContent=`✅ ${res.user.name} — Token: ${res.user.token}`;
  $('newUserName').value='';
  loadUsers();
};

window.loadUsers=async function(){
  const token=getToken();if(!token)return;
  const data=await jsonp('get_users',{token});
  if(!data.ok)return;
  const box=$('userPermList'); box.innerHTML='';
  (data.users||[]).forEach(u=>{
    const div=document.createElement('div'); div.className='user-card';
    const perms=(u.permissions||'').split(',').map(s=>s.trim()).filter(Boolean);
    const allPerms=['wages','deposits'];
    div.innerHTML=`
      <div class="user-name">${u.name} <span style="font-size:11px;color:#aaa;">(${u.role})</span></div>
      <div class="user-token">${u.token}</div>
      <div class="perm-row">
        ${allPerms.map(p=>`<button class="perm-btn ${perms.includes(p)?'on':''}" onclick="togglePerm('${u.token}','${p}',this)">${p}</button>`).join('')}
        <button class="perm-btn ${u.active?'on':''}" style="${u.active?'background:#1a6a1a;border-color:#1a6a1a;':'background:#c00;color:#fff;border-color:#c00;'}" onclick="toggleActive('${u.token}',${u.active},this)">${u.active?'✅ Active':'❌ Inactive'}</button>
      </div>
    `;
    box.appendChild(div);
  });
};

window.togglePerm=async function(userToken, perm, btn){
  const token=getToken();
  // Get current permissions from sibling buttons
  const row=btn.parentElement;
  const currentPerms=[];
  row.querySelectorAll('.perm-btn').forEach(b=>{
    if(b.textContent==='✅ Active'||b.textContent==='❌ Inactive')return;
    if(b.classList.contains('on'))currentPerms.push(b.textContent.trim());
  });
  // Toggle
  const idx=currentPerms.indexOf(perm);
  if(idx>=0)currentPerms.splice(idx,1);
  else currentPerms.push(perm);
  const newPerms=currentPerms.join(',');
  const res=await jsonp('set_permissions',{token,user_token:userToken,permissions:newPerms});
  if(!res.ok){alert('Error: '+(res.error||''));return;}
  btn.classList.toggle('on',currentPerms.includes(perm));
};

window.toggleActive=async function(userToken, currentActive, btn){
  const token=getToken();
  const newActive=!currentActive;
  const res=await jsonp('set_user_active',{token,user_token:userToken,active:String(newActive).toUpperCase()});
  if(!res.ok){alert('Error: '+(res.error||''));return;}
  btn.textContent=newActive?'✅ Active':'❌ Inactive';
  btn.style.background=newActive?'#1a6a1a':'#c00';
  btn.style.borderColor=newActive?'#1a6a1a':'#c00';
};

// ── Init ──────────────────────────────────────────────────
const saved=localStorage.getItem('lpa_token'), fromUrl=qs.get('token');
if(fromUrl)$('tokenInput').value=fromUrl;
else if(saved)$('tokenInput').value=saved;

refreshSummary();
setInterval(()=>{if(currentPage==='wages')refreshSummary();},15000);
</script>
